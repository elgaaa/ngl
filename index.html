<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIZX NGL SPAM | GitHub Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'sans': ['Inter', 'system-ui'] },
                    animation: { 'glow': 'glow 2s ease-in-out infinite alternate' },
                    keyframes: {
                        glow: { '0%': { boxShadow: '0 0 5px rgba(0,255,255,0.2)' }, '100%': { boxShadow: '0 0 25px rgba(0,255,255,0.5)' } }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: linear-gradient(135deg, #0a0a1a 0%, #0f0f2a 100%); }
        .glass { background: rgba(10, 15, 25, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(0, 255, 255, 0.15); }
        .premium-text { background: linear-gradient(90deg, #00c6ff, #0072ff, #00c6ff); background-size: 200% auto; -webkit-background-clip: text; background-clip: text; color: transparent; animation: shine 2s linear infinite; }
        @keyframes shine { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { background: #00c6ff; border-radius: 10px; }
        button { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        button:active { transform: scale(0.96); }
        .log-line { border-left: 2px solid transparent; transition: 0.1s; }
        .log-line:hover { border-left-color: #00c6ff; background: rgba(0, 198, 255, 0.05); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="max-w-5xl w-full">
    <!-- Header -->
    <div class="text-center mb-6">
        <div class="inline-block mb-2">
            <div class="bg-gradient-to-r from-cyan-500 to-blue-600 rounded-2xl p-[2px]">
                <div class="bg-[#0a0e17] rounded-2xl px-5 py-1.5">
                    <i class="fab fa-github text-white mr-2"></i>
                    <span class="text-cyan-400 font-bold">DIZX GITHUB EDITION</span>
                    <i class="fas fa-skull text-red-500 ml-2"></i>
                </div>
            </div>
        </div>
        <h1 class="text-5xl font-black premium-text">NGL SPAM KILLER</h1>
        <p class="text-gray-400 text-sm mt-2">Deploy di GitHub • Work 100% • No CORS Error</p>
    </div>

    <!-- Main Card -->
    <div class="glass rounded-3xl p-6 shadow-2xl animate-glow">
        <!-- Target -->
        <div class="mb-5">
            <label class="block text-cyan-400 text-sm font-semibold mb-2"><i class="fas fa-bullseye mr-2"></i>TARGET NGL CODE</label>
            <input type="text" id="target" class="w-full bg-[#0a0e18] border border-cyan-500/30 rounded-xl px-4 py-3 text-white text-center text-lg" placeholder="@username">
            <p class="text-gray-500 text-xs mt-1">Contoh: kenziee_aja (tanpa @)</p>
        </div>

        <!-- Pesan -->
        <div class="mb-5">
            <label class="block text-cyan-400 text-sm font-semibold mb-2"><i class="fas fa-message mr-2"></i>PESAN SPAM</label>
            <textarea id="messages" rows="3" class="w-full bg-[#0a0e18] border border-cyan-500/30 rounded-xl px-4 py-3 text-white" placeholder="Pesan per baris..."></textarea>
            <button id="defaultBtn" class="text-xs text-cyan-400/70 hover:text-cyan-300 mt-2"><i class="fas fa-refresh mr-1"></i>Pakai Default</button>
        </div>

        <!-- Settings -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div><label class="text-gray-400 text-xs"><i class="fas fa-bolt mr-1"></i>THREAD</label><input type="number" id="threads" value="12" min="1" max="30" class="w-full bg-[#0a0e18] border border-gray-700 rounded-xl px-3 py-2 text-white"></div>
            <div><label class="text-gray-400 text-xs"><i class="fas fa-hourglass-half mr-1"></i>DELAY (MS)</label><input type="number" id="delay" value="300" min="100" max="2000" class="w-full bg-[#0a0e18] border border-gray-700 rounded-xl px-3 py-2 text-white"></div>
            <div><label class="text-gray-400 text-xs"><i class="fas fa-flag-checkered mr-1"></i>TARGET SENT</label><input type="number" id="targetCount" value="150" min="10" max="500" class="w-full bg-[#0a0e18] border border-gray-700 rounded-xl px-3 py-2 text-white"></div>
            <div><label class="text-gray-400 text-xs"><i class="fas fa-shield mr-1"></i>BYPASS MODE</label><select id="bypassMode" class="w-full bg-[#0a0e18] border border-gray-700 rounded-xl px-3 py-2 text-white"><option value="cors">CORS PROXY</option><option value="direct">DIRECT</option></select></div>
        </div>

        <!-- Buttons -->
        <div class="flex gap-3 mb-7">
            <button id="startBtn" class="flex-1 bg-gradient-to-r from-red-600 to-red-800 hover:from-red-500 hover:to-red-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-red-500/30"><i class="fas fa-play mr-2"></i>START SPAM</button>
            <button id="stopBtn" class="flex-1 bg-gray-800 hover:bg-gray-700 text-white font-bold py-3 rounded-xl"><i class="fas fa-stop mr-2"></i>STOP</button>
            <button id="clearBtn" class="bg-gray-800 hover:bg-gray-700 text-white px-5 py-3 rounded-xl"><i class="fas fa-trash"></i></button>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-4 gap-3 mb-6">
            <div class="bg-[#0a0e18]/80 rounded-xl p-3 text-center border border-cyan-500/20"><div class="text-gray-500 text-xs">SENT</div><div class="text-2xl font-bold text-white" id="sent">0</div></div>
            <div class="bg-[#0a0e18]/80 rounded-xl p-3 text-center border border-green-500/20"><div class="text-gray-500 text-xs">SUCCESS</div><div class="text-2xl font-bold text-green-400" id="success">0</div></div>
            <div class="bg-[#0a0e18]/80 rounded-xl p-3 text-center border border-red-500/20"><div class="text-gray-500 text-xs">FAILED</div><div class="text-2xl font-bold text-red-400" id="failed">0</div></div>
            <div class="bg-[#0a0e18]/80 rounded-xl p-3 text-center border border-yellow-500/20"><div class="text-gray-500 text-xs">RATE/S</div><div class="text-2xl font-bold text-yellow-400" id="rate">0</div></div>
        </div>

        <!-- Log -->
        <div>
            <div class="flex justify-between mb-2"><span class="text-cyan-400 text-sm"><i class="fas fa-terminal mr-2"></i>LIVE LOG</span><span id="status" class="text-xs bg-red-800 px-3 py-1 rounded-full">● STOPPED</span></div>
            <div id="log" class="bg-[#05070f] rounded-xl p-3 h-64 overflow-y-auto font-mono text-xs border border-gray-800"></div>
        </div>
    </div>

    <div class="text-center text-gray-600 text-xs mt-5"><i class="fab fa-github mr-1"></i>DIZX GITHUB EDITION | WORK 100% | BYPASS CORS</div>
</div>

<script>
// ==================== GITHUB FIX - PAKE CORS PROXY GRATIS ====================
let isRunning = false;
let stopFlag = false;
let stats = { sent: 0, success: 0, failed: 0 };
let lastRateTime = Date.now();
let rateCount = 0;

const DEFAULT_MSGS = ["💀 SPAM DIZX", "🔥 KENZIE KENA", "👑 GAS TERUS", "⚡ BOT ACTIVE", "🎯 TARGET TUMBAL", "💎 PREMIUM", "🚀 NGL MATI", "😈 DIZX RULES"];

// CORS Proxy gratis (work di GitHub Pages)
const CORS_PROXIES = [
    "https://cors-anywhere.herokuapp.com/",
    "https://api.allorigins.win/raw?url=",
    "https://cors-proxy.htmldriven.com/?url=",
    "https://proxy.cors.sh/"
];

function addLog(msg, type = "info") {
    const logDiv = document.getElementById("log");
    const colors = { success: "text-green-400", error: "text-red-400", info: "text-cyan-400", warn: "text-yellow-400" };
    const icons = { success: "✅", error: "❌", info: "ℹ️", warn: "⚠️" };
    const time = new Date().toLocaleTimeString();
    logDiv.innerHTML += `<div class="log-line py-0.5 pl-1 ${colors[type]}">[${time}] ${icons[type]} ${msg}</div>`;
    logDiv.scrollTop = logDiv.scrollHeight;
    if (logDiv.children.length > 150) while(logDiv.children.length > 120) logDiv.removeChild(logDiv.firstChild);
}

function updateStats() {
    document.getElementById("sent").innerText = stats.sent;
    document.getElementById("success").innerText = stats.success;
    document.getElementById("failed").innerText = stats.failed;
    const now = Date.now();
    const elapsed = (now - lastRateTime) / 1000;
    if (elapsed >= 1) {
        document.getElementById("rate").innerText = Math.round(rateCount / elapsed);
        rateCount = 0;
        lastRateTime = now;
    }
}

// Kirim spam via CORS proxy
async function sendSpamViaProxy(target, message, threadId) {
    const directUrl = "https://ngl.link/api/submit";
    const proxyUrl = CORS_PROXIES[Math.floor(Math.random() * CORS_PROXIES.length)] + encodeURIComponent(directUrl);
    
    const deviceId = `gh_${Date.now()}_${Math.random().toString(36).substring(2, 8)}_${threadId}`;
    const payload = {
        question: message + ` [T${threadId}]`,
        deviceId: deviceId,
        gameSlug: "",
        referrer: target
    };
    
    try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);
        
        const response = await fetch(proxyUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Origin": "https://ngl.link",
                "Referer": "https://ngl.link/",
                "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
            },
            body: JSON.stringify(payload),
            signal: controller.signal
        });
        
        clearTimeout(timeoutId);
        
        if (response.ok || response.status === 200 || response.status === 201) {
            return { success: true };
        }
        return { success: false, status: response.status };
    } catch (e) {
        return { success: false, error: e.message };
    }
}

// Kirim langsung (tanpa proxy)
async function sendSpamDirect(target, message, threadId) {
    const deviceId = `direct_${Date.now()}_${Math.random() * 999999}`;
    const payload = {
        question: message + ` [T${threadId}]`,
        deviceId: deviceId,
        gameSlug: "",
        referrer: target
    };
    
    try {
        const response = await fetch("https://ngl.link/api/submit", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
        return { success: response.ok };
    } catch (e) {
        return { success: false, error: e.message };
    }
}

async function spamLoop(target, messages, delayMs, threadId, targetCount, useProxy) {
    while (!stopFlag && stats.sent < targetCount) {
        const msg = messages[Math.floor(Math.random() * messages.length)];
        let result;
        
        if (useProxy) {
            result = await sendSpamViaProxy(target, msg, threadId);
        } else {
            result = await sendSpamDirect(target, msg, threadId);
        }
        
        stats.sent++;
        rateCount++;
        
        if (result.success) {
            stats.success++;
            addLog(`T${threadId} ✓ ${msg.substring(0, 35)}`, "success");
        } else {
            stats.failed++;
            addLog(`T${threadId} ✗ ${result.error || `HTTP ${result.status}`}`, "error");
        }
        
        updateStats();
        
        if (!stopFlag && stats.sent < targetCount) {
            await new Promise(r => setTimeout(r, delayMs));
        }
    }
}

async function startSpam() {
    if (isRunning) {
        addLog("Spam sudah berjalan!", "warn");
        return;
    }
    
    const target = document.getElementById("target").value.trim();
    if (!target) {
        addLog("Masukkan target username!", "error");
        Swal.fire({ title: "Error!", text: "Target kosong!", icon: "error", background: "#0a0e18", color: "#fff" });
        return;
    }
    
    let msgText = document.getElementById("messages").value.trim();
    let messages = msgText ? msgText.split("\n").filter(m => m.trim()) : [...DEFAULT_MSGS];
    if (messages.length === 0) messages = [...DEFAULT_MSGS];
    
    const threads = Math.min(parseInt(document.getElementById("threads").value) || 12, 25);
    const delay = Math.max(parseInt(document.getElementById("delay").value) || 300, 150);
    const targetCount = parseInt(document.getElementById("targetCount").value) || 150;
    const useProxy = document.getElementById("bypassMode").value === "cors";
    
    stopFlag = false;
    isRunning = true;
    stats = { sent: 0, success: 0, failed: 0 };
    rateCount = 0;
    lastRateTime = Date.now();
    updateStats();
    
    document.getElementById("status").innerHTML = "🔥 SPAMMING 🔥";
    document.getElementById("status").className = "text-xs bg-green-800 px-3 py-1 rounded-full";
    
    addLog(`🚀 START @${target} | Target: ${targetCount} | Delay: ${delay}ms | Thread: ${threads}`, "warn");
    addLog(`📝 Pesan: ${messages.length} varian | Mode: ${useProxy ? "CORS PROXY" : "DIRECT"}`, "info");
    addLog(`💡 Pastikan koneksi stabil! Jika error ganti ke mode DIRECT`, "info");
    
    const promises = [];
    for (let i = 1; i <= threads; i++) {
        promises.push(spamLoop(target, messages, delay, i, targetCount, useProxy));
    }
    
    Promise.all(promises).then(() => {
        if (!stopFlag) {
            stopSpam(true);
            Swal.fire({ title: "Complete!", text: `${stats.success} sukses dari ${stats.sent} pesan!`, icon: "success", background: "#0a0e18", color: "#fff" });
        }
    });
}

function stopSpam(auto = false) {
    if (!isRunning && !auto) return;
    stopFlag = true;
    isRunning = false;
    document.getElementById("status").innerHTML = "● STOPPED";
    document.getElementById("status").className = "text-xs bg-red-800 px-3 py-1 rounded-full";
    if (!auto) addLog("⏹️ Spam dihentikan", "warn");
}

function clearLog() {
    document.getElementById("log").innerHTML = '<div class="text-gray-500">[!] Log cleared</div>';
    addLog("Console dibersihkan", "info");
}

function loadDefaultMsg() {
    document.getElementById("messages").value = DEFAULT_MSGS.join("\n");
    addLog("Pesan default dimuat", "info");
}

document.getElementById("startBtn").onclick = startSpam;
document.getElementById("stopBtn").onclick = () => stopSpam(false);
document.getElementById("clearBtn").onclick = clearLog;
document.getElementById("defaultBtn").onclick = loadDefaultMsg;

addLog("✅ DIZX GITHUB EDITION READY", "success");
addLog("⚡ Mode: CORS Proxy + Direct Fallback", "info");
addLog("🎯 Masukkan target dan mulai spam!", "info");
</script>
</body>
</html>
