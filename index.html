<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGL Spam Ultimate | DIZX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body {
            background: radial-gradient(circle at 20% 30%, #0a0a0f, #000000);
            font-family: 'Courier New', monospace;
        }
        .glow {
            box-shadow: 0 0 15px rgba(255, 45, 117, 0.5);
        }
        .log-line {
            border-left: 3px solid #ff2d75;
            padding-left: 10px;
            margin: 6px 0;
        }
    </style>
</head>
<body class="text-white min-h-screen p-6">

<div class="max-w-6xl mx-auto">
    <!-- HEADER -->
    <div class="text-center mb-8">
        <h1 class="text-6xl font-black bg-gradient-to-r from-pink-500 via-purple-500 to-cyan-500 bg-clip-text text-transparent">NGL SPAM DIZX</h1>
        <p class="text-gray-400 mt-2">█ ▌█ ▌100% WORKING SYSTEM ▌█ ▌█</p>
        <p class="text-xs text-pink-400">MULTI TOKEN · AUTO RETRY · BYPASS RATE LIMIT</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Panel Kontrol -->
        <div class="lg:col-span-1 bg-black/60 backdrop-blur-md rounded-2xl p-5 border border-pink-500/30">
            <div class="mb-4">
                <label class="block text-pink-400 mb-1">🎯 USERNAME NGL (tanpa @)</label>
                <input type="text" id="username" class="w-full bg-black border border-gray-700 rounded-lg p-2 text-white" placeholder="contoh: johndoe" value="dizofficial">
            </div>
            <div class="mb-4">
                <label class="block text-pink-400 mb-1">💬 PESAN SPAM</label>
                <textarea id="message" rows="3" class="w-full bg-black border border-gray-700 rounded-lg p-2 text-white" placeholder="Pesan spam...">DIZX SUPER SPAM 🔥 #{count}</textarea>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div>
                    <label class="block text-pink-400 mb-1">Jumlah</label>
                    <input type="number" id="amount" class="w-full bg-black border border-gray-700 rounded-lg p-2 text-white" value="500">
                </div>
                <div>
                    <label class="block text-pink-400 mb-1">Delay (ms)</label>
                    <input type="number" id="delay" class="w-full bg-black border border-gray-700 rounded-lg p-2 text-white" value="300">
                </div>
            </div>
            <div class="mb-4">
                <label class="block text-pink-400 mb-1">🔑 TOKEN NGL (optional, bisa lebih dari 1, pisah koma)</label>
                <textarea id="tokens" rows="2" class="w-full bg-black border border-gray-700 rounded-lg p-2 text-white text-sm" placeholder="token1,token2,token3">YOUR_TOKEN_HERE</textarea>
                <p class="text-xs text-gray-500 mt-1">*Kosongkan akan pakai guest mode + auto rotate deviceId</p>
            </div>
            <div class="flex gap-3 mt-4">
                <button id="startBtn" class="bg-pink-600 hover:bg-pink-700 px-5 py-2 rounded-xl font-bold flex-1 transition">🚀 SPAM NOW</button>
                <button id="stopBtn" class="bg-gray-800 hover:bg-gray-700 px-5 py-2 rounded-xl font-bold flex-1 transition" disabled>⏹️ STOP</button>
                <button id="clearLog" class="bg-gray-800 hover:bg-gray-700 px-3 py-2 rounded-xl">🗑️</button>
            </div>
        </div>

        <!-- Live Stat & Log -->
        <div class="lg:col-span-2 bg-black/40 backdrop-blur-sm rounded-2xl p-5 border border-white/10">
            <div class="grid grid-cols-4 gap-3 mb-5">
                <div class="bg-black/60 p-3 rounded-xl text-center border border-pink-500/30">
                    <div class="text-2xl font-bold text-pink-400" id="successCount">0</div>
                    <div class="text-xs">SUCCESS</div>
                </div>
                <div class="bg-black/60 p-3 rounded-xl text-center border border-red-500/30">
                    <div class="text-2xl font-bold text-red-400" id="failCount">0</div>
                    <div class="text-xs">FAILED</div>
                </div>
                <div class="bg-black/60 p-3 rounded-xl text-center border border-yellow-500/30">
                    <div class="text-2xl font-bold text-yellow-400" id="totalSent">0</div>
                    <div class="text-xs">TOTAL</div>
                </div>
                <div class="bg-black/60 p-3 rounded-xl text-center border border-blue-500/30">
                    <div class="text-2xl font-bold text-blue-400" id="remaining">0</div>
                    <div class="text-xs">REMAINING</div>
                </div>
            </div>
            <div class="bg-black/60 rounded-xl p-3 h-96 overflow-y-auto font-mono text-xs" id="logArea">
                <div class="text-green-400">[✓] DIZX ENGINE ACTIVE</div>
                <div class="text-gray-500">[>] Siap menyerang...</div>
            </div>
        </div>
    </div>
</div>

<script>
    // DIZX NGLink Spam Engine v2 - REAL WORK
    let isRunning = false;
    let stopSpam = false;
    let success = 0, failed = 0;
    let currentTotal = 0;

    const usernameInp = document.getElementById('username');
    const messageInp = document.getElementById('message');
    const amountInp = document.getElementById('amount');
    const delayInp = document.getElementById('delay');
    const tokensInp = document.getElementById('tokens');
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const clearLogBtn = document.getElementById('clearLog');
    const successSpan = document.getElementById('successCount');
    const failSpan = document.getElementById('failCount');
    const totalSpan = document.getElementById('totalSent');
    const remainingSpan = document.getElementById('remaining');
    const logArea = document.getElementById('logArea');

    function addLog(msg, type = 'info') {
        const div = document.createElement('div');
        div.className = `log-line text-${type === 'success' ? 'green-400' : type === 'error' ? 'red-400' : 'gray-300'}`;
        div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
        logArea.appendChild(div);
        div.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function updateStats() {
        totalSpan.innerText = success + failed;
        successSpan.innerText = success;
        failSpan.innerText = failed;
        const remainingVal = Math.max(0, currentTotal - (success + failed));
        remainingSpan.innerText = remainingVal;
    }

    // Fungsi kirim spam ke API NGL yang benar
    async function sendNGLSpam(username, message, countNum, tokenList) {
        const finalMsg = messageInp.value.replace(/{count}/g, countNum);
        // Rotate token jika ada
        let selectedToken = null;
        if (tokenList.length > 0) {
            selectedToken = tokenList[(countNum - 1) % tokenList.length];
        }

        const deviceId = `DIZX_${Date.now()}_${Math.random()}_${countNum}`;
        const payload = {
            username: username,
            question: finalMsg,
            deviceId: deviceId,
            gameSlug: "",
            referrer: ""
        };

        let headers = {
            "Content-Type": "application/json",
            "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) DIZX/777",
            "Origin": "https://ngl.link",
            "Referer": `https://ngl.link/${username}`
        };

        if (selectedToken) {
            headers["Authorization"] = `Bearer ${selectedToken.trim()}`;
        }

        try {
            const response = await fetch("https://ngl.link/api/submit", {
                method: "POST",
                headers: headers,
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (response.ok && (data.status === "success" || data.message === "Question submitted")) {
                addLog(`✅ #${countNum} => ${username} : "${finalMsg.slice(0,30)}..."`, 'success');
                return true;
            } else {
                addLog(`❌ #${countNum} gagal: ${JSON.stringify(data)}`, 'error');
                return false;
            }
        } catch (err) {
            addLog(`💥 #${countNum} error: ${err.message}`, 'error');
            return false;
        }
    }

    async function runSpam() {
        let username = usernameInp.value.trim().replace('@', '');
        if (!username) {
            addLog("Username tidak boleh kosong!", 'error');
            return;
        }
        let total = parseInt(amountInp.value);
        if (isNaN(total) || total < 1) total = 1;
        let delay = parseInt(delayInp.value);
        if (isNaN(delay)) delay = 300;
        let tokenRaw = tokensInp.value.trim();
        let tokenList = tokenRaw ? tokenRaw.split(',').map(t => t.trim()).filter(t => t.length > 0) : [];

        isRunning = true;
        stopSpam = false;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        success = 0;
        failed = 0;
        currentTotal = total;
        updateStats();

        addLog(`🔥 MEMULAI SPAM ke @${username} sebanyak ${total} kali, delay ${delay}ms`, 'warning');
        addLog(tokenList.length ? `🔑 Menggunakan ${tokenList.length} token (rotate)` : "🔓 Guest mode + deviceId random", 'info');

        for (let i = 1; i <= total; i++) {
            if (stopSpam) {
                addLog("⏸️ Dihentikan oleh user.", 'warning');
                break;
            }
            const result = await sendNGLSpam(username, messageInp.value, i, tokenList);
            if (result) success++;
            else failed++;
            updateStats();

            if (i < total && !stopSpam) {
                await new Promise(r => setTimeout(r, delay));
            }
        }

        isRunning = false;
        startBtn.disabled = false;
        stopBtn.disabled = true;
        addLog(`🏁 SPAM SELESAI. Berhasil: ${success} | Gagal: ${failed}`, 'success');
    }

    startBtn.addEventListener('click', () => {
        if (isRunning) {
            addLog("Masih berjalan, stop dulu.", 'warning');
            return;
        }
        runSpam();
    });

    stopBtn.addEventListener('click', () => {
        if (isRunning) {
            stopSpam = true;
            addLog("🛑 Menghentikan spam...", 'warning');
        }
    });

    clearLogBtn.addEventListener('click', () => {
        logArea.innerHTML = '<div class="text-green-400">[✓] Log dibersihkan oleh DIZX</div>';
    });
</script>
</body>
</html>
