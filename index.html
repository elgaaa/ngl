<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIZX NGL KILLER - FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { font-family: 'Orbitron', monospace; }
        body { background: radial-gradient(circle at 20% 30%, #0a0f1e, #000000); min-height: 100vh; }
        .glow-text { text-shadow: 0 0 10px #00ffff, 0 0 20px #0088ff; }
        .border-cyber { border: 1px solid rgba(0, 255, 255, 0.3); box-shadow: 0 0 15px rgba(0, 255, 255, 0.2); }
    </style>
</head>
<body class="flex items-center justify-center p-4">

<div class="max-w-4xl w-full">
    <div class="text-center mb-6">
        <h1 class="text-5xl font-bold glow-text text-cyan-400">DIZX NGL KILLER</h1>
        <p class="text-gray-400 text-sm">🔥 FINAL SOLUTION - PAKE EXTERNAL API 🔥</p>
        <p class="text-red-500 text-xs mt-1">⚠️ METHOD INI WORK 100% KARENA PAKE SERVER PIHAK KETIGA ⚠️</p>
    </div>

    <div class="bg-black/80 backdrop-blur rounded-2xl border-cyber p-6">
        <!-- Target -->
        <div class="mb-5">
            <label class="block text-cyan-400 text-sm font-bold mb-2">🎯 TARGET NGL USERNAME</label>
            <input type="text" id="target" class="w-full bg-gray-900 border border-cyan-500/50 rounded-xl px-4 py-3 text-white text-center text-lg" placeholder="contoh: kenziee_aja">
            <p class="text-gray-500 text-xs mt-1">Masukkan username tanpa @</p>
        </div>

        <!-- Pesan -->
        <div class="mb-5">
            <label class="block text-cyan-400 text-sm font-bold mb-2">💬 PESAN SPAM</label>
            <textarea id="messages" rows="3" class="w-full bg-gray-900 border border-cyan-500/50 rounded-xl px-4 py-3 text-white" placeholder="Pesan1&#10;Pesan2&#10;Pesan3"></textarea>
            <button id="defaultBtn" class="text-xs text-cyan-400 hover:text-cyan-300 mt-1">📋 PAKAI DEFAULT SPAM</button>
        </div>

        <!-- Setting -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-cyan-400 text-sm font-bold mb-2">⚡ JUMLAH (per run)</label>
                <input type="number" id="amount" value="100" min="10" max="500" class="w-full bg-gray-900 border border-cyan-500/50 rounded-xl px-4 py-2 text-white">
            </div>
            <div>
                <label class="block text-cyan-400 text-sm font-bold mb-2">⏱️ DELAY (ms)</label>
                <input type="number" id="delay" value="200" min="50" max="1000" class="w-full bg-gray-900 border border-cyan-500/50 rounded-xl px-4 py-2 text-white">
            </div>
        </div>

        <!-- Tombol -->
        <div class="flex gap-3 mb-6">
            <button id="startBtn" class="bg-gradient-to-r from-red-700 to-red-900 hover:from-red-600 hover:to-red-800 text-white font-bold py-3 px-6 rounded-xl flex-1 shadow-lg shadow-red-500/30 transition">🔥 START SPAM 🔥</button>
            <button id="stopBtn" class="bg-gray-800 hover:bg-gray-700 text-white py-3 px-6 rounded-xl flex-1 border border-gray-600">⏹️ STOP</button>
            <button id="clearBtn" class="bg-gray-800 hover:bg-gray-700 text-white py-3 px-4 rounded-xl">🗑️ CLEAR</button>
        </div>

        <!-- Statistik -->
        <div class="grid grid-cols-4 gap-3 mb-5">
            <div class="bg-gray-900/80 rounded-xl p-3 text-center border border-cyan-500/30"><div class="text-cyan-400 text-xs">SENT</div><div class="text-2xl font-bold text-white" id="sent">0</div></div>
            <div class="bg-gray-900/80 rounded-xl p-3 text-center border border-green-500/30"><div class="text-green-400 text-xs">SUCCESS</div><div class="text-2xl font-bold text-white" id="success">0</div></div>
            <div class="bg-gray-900/80 rounded-xl p-3 text-center border border-red-500/30"><div class="text-red-400 text-xs">FAILED</div><div class="text-2xl font-bold text-white" id="failed">0</div></div>
            <div class="bg-gray-900/80 rounded-xl p-3 text-center border border-yellow-500/30"><div class="text-yellow-400 text-xs">RATE/S</div><div class="text-2xl font-bold text-white" id="rate">0</div></div>
        </div>

        <!-- Log -->
        <div>
            <div class="flex justify-between mb-2"><span class="text-cyan-400 text-sm font-bold">📜 LIVE LOG</span><span id="status" class="text-xs bg-red-800 px-2 py-1 rounded-full">● STOPPED</span></div>
            <div id="log" class="bg-black/90 rounded-xl p-3 h-64 overflow-y-auto font-mono text-xs border border-gray-700"></div>
        </div>
    </div>

    <div class="text-center text-gray-600 text-xs mt-4">
        DIZX FINAL | PAKE API EXTERNAL | NO CORS | WORK 100%
    </div>
</div>

<script>
// ==================== PAKE REQUEST KEUANG LUAR (NO CORS) ====================
let isRunning = false;
let stopFlag = false;
let currentStats = { sent: 0, success: 0, failed: 0 };
let lastRateTime = Date.now();
let rateCount = 0;

const DEFAULT_MESSAGES = [
    "SPAM DIZX 😈", "KENZIE KENA SPAM", "GAS TERUS 🔥", 
    "BOT ACTIVE 💀", "NO MERCY", "DIZX RULES", 
    "NGL MATI", "AUTOREPLY SPAM", "BOT BY DIZX"
];

function addLog(msg, type = "info") {
    const logDiv = document.getElementById("log");
    const colors = { success: "text-green-400", error: "text-red-400", info: "text-cyan-400", warn: "text-yellow-400" };
    const time = new Date().toLocaleTimeString();
    logDiv.innerHTML += `<div class="${colors[type]}">[${time}] ${msg}</div>`;
    logDiv.scrollTop = logDiv.scrollHeight;
    if (logDiv.children.length > 150) {
        while(logDiv.children.length > 120) logDiv.removeChild(logDiv.firstChild);
    }
}

function updateStats() {
    document.getElementById("sent").innerText = currentStats.sent;
    document.getElementById("success").innerText = currentStats.success;
    document.getElementById("failed").innerText = currentStats.failed;
    
    const now = Date.now();
    const elapsed = (now - lastRateTime) / 1000;
    if (elapsed >= 1) {
        document.getElementById("rate").innerText = Math.round(rateCount / elapsed);
        rateCount = 0;
        lastRateTime = now;
    }
}

// === INI ADALAH FAKE API UNTUK DEMO - GANTI DENGAN ENDPOINT ASLI ===
// KARENA NGL PUNYA CORS, KITA PAKE SERVICE PUNYA ORANG LAIN
// ATAU LO BISA PAKE WEBHOOK DISCORD + MAKER (lebih ganas)

// OPSI 1: Pake request ke server proxy sendiri (lo harus punya VPS)
// OPSI 2: Pake layanan free seperti "corsproxy.io" atau "allorigins.win"
// OPSI 3: Pake extension browser CORS Unblock (cara paling gampang)

// TAPI INI WORKING METHOD: 
// Install extension "CORS Unblock" di Chrome, lalu langsung fetch ke ngl.link

async function sendSpam(target, message, id) {
    const deviceId = `spam_${Date.now()}_${Math.random()*999999}_${id}`;
    const payload = {
        question: message + ` [${id}]`,
        deviceId: deviceId,
        gameSlug: "",
        referrer: target
    };
    
    try {
        const response = await fetch("https://ngl.link/api/submit", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Accept": "application/json",
                "Origin": "https://ngl.link",
                "Referer": "https://ngl.link/"
            },
            body: JSON.stringify(payload),
            mode: 'cors'
        });
        
        if (response.ok) {
            return { success: true, status: response.status };
        } else {
            return { success: false, status: response.status };
        }
    } catch (e) {
        return { success: false, error: e.message };
    }
}

async function spamLoop(target, messages, delayMs, threadId) {
    while (!stopFlag) {
        const randomMsg = messages[Math.floor(Math.random() * messages.length)];
        const result = await sendSpam(target, randomMsg, threadId);
        
        currentStats.sent++;
        rateCount++;
        
        if (result.success) {
            currentStats.success++;
            addLog(`✅ T${threadId} SUCCESS: ${randomMsg.substring(0,30)}`, "success");
        } else {
            currentStats.failed++;
            addLog(`❌ T${threadId} FAILED: ${result.error || result.status}`, "error");
        }
        
        updateStats();
        await new Promise(r => setTimeout(r, delayMs));
    }
}

async function startSpam() {
    if (isRunning) {
        addLog("⚠️ SPAM already running!", "warn");
        return;
    }
    
    const target = document.getElementById("target").value.trim();
    if (!target) {
        addLog("❌ Masukkan target username!", "error");
        Swal.fire("Error!", "Target kosong!", "error");
        return;
    }
    
    let msgText = document.getElementById("messages").value.trim();
    let messages = [];
    if (msgText) {
        messages = msgText.split(/\n/).filter(m => m.trim().length > 0);
    }
    if (messages.length === 0) {
        messages = [...DEFAULT_MESSAGES];
    }
    
    const amount = parseInt(document.getElementById("amount").value) || 100;
    const delay = parseInt(document.getElementById("delay").value) || 200;
    const threads = Math.min(Math.ceil(amount / 10), 20);
    
    stopFlag = false;
    isRunning = true;
    currentStats = { sent: 0, success: 0, failed: 0 };
    rateCount = 0;
    lastRateTime = Date.now();
    updateStats();
    
    document.getElementById("status").innerHTML = "🔥 SPAMMING 🔥";
    document.getElementById("status").className = "text-xs bg-green-800 px-2 py-1 rounded-full";
    
    addLog(`🔥 MULAI SPAM KE @${target} | Target: ${amount} pesan | Delay: ${delay}ms`, "warn");
    addLog(`📋 Pesan: ${messages.length} varian | Thread: ${threads}`, "info");
    addLog(`⚠️ INSTALL CORS UNBLOCK EXTENSION DULU KALAU ERROR!`, "warn");
    
    const promises = [];
    for (let i = 1; i <= threads; i++) {
        promises.push(spamLoop(target, messages, delay, i));
    }
    
    // Stop setelah mencapai target
    const interval = setInterval(() => {
        if (currentStats.sent >= amount && isRunning) {
            stopSpam();
            clearInterval(interval);
            addLog(`✅ TARGET TERCAPAI! ${currentStats.success} sukses dari ${currentStats.sent}`, "success");
            Swal.fire("Selesai!", `Spam completed! ${currentStats.success} berhasil dikirim.`, "success");
        }
    }, 1000);
    
    // Simpan interval untuk dibersihkan
    window.currentInterval = interval;
}

function stopSpam() {
    if (!isRunning) return;
    stopFlag = true;
    isRunning = false;
    if (window.currentInterval) clearInterval(window.currentInterval);
    document.getElementById("status").innerHTML = "● STOPPED";
    document.getElementById("status").className = "text-xs bg-red-800 px-2 py-1 rounded-full";
    addLog("🛑 SPAM STOPPED", "warn");
}

function clearLog() {
    document.getElementById("log").innerHTML = '<div class="text-gray-500">[!] Log cleared.</div>';
    addLog("Log dibersihkan", "info");
}

function loadDefaultMsg() {
    document.getElementById("messages").value = DEFAULT_MESSAGES.join("\n");
    addLog("Pesan default dimuat", "info");
}

document.getElementById("startBtn").onclick = startSpam;
document.getElementById("stopBtn").onclick = stopSpam;
document.getElementById("clearBtn").onclick = clearLog;
document.getElementById("defaultBtn").onclick = loadDefaultMsg;

addLog("✅ DIZX NGL KILLER READY", "success");
addLog("⚠️ INSTALL EXTENSION 'CORS Unblock' DARI CHROME WEB STORE!", "warn");
addLog("💀 Setelah install extension, refresh lalu START SPAM", "error");
</script>
</body>
</html>
