<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGL SPAM FIXED - DIZX FINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { font-family: 'Orbitron', monospace; }
        body { background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b); }
        .glow { text-shadow: 0 0 10px cyan; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div class="max-w-5xl w-full">
    <div class="text-center mb-6">
        <h1 class="text-5xl font-bold glow text-cyan-400">DIZX NGL FIXED</h1>
        <p class="text-gray-400">BYPASS CORS + RATE LIMIT + PROXY ROTATION</p>
        <div class="text-xs text-cyan-600 mt-1">👑 DIZX EXTREME EDITION - 100% WORK 👑</div>
    </div>

    <div class="bg-black/70 backdrop-blur rounded-2xl border border-cyan-500/30 p-6">
        <!-- Target -->
        <div class="mb-5">
            <label class="block text-cyan-400 text-sm font-bold mb-1">🎯 TARGET NGL CODE</label>
            <input type="text" id="targetCode" class="w-full bg-gray-900 border border-cyan-500 rounded-xl px-4 py-3 text-white" placeholder="contoh: kenziee_aja">
        </div>

        <!-- Messages -->
        <div class="mb-5">
            <label class="block text-cyan-400 text-sm font-bold mb-1">💬 PESAN SPAM</label>
            <textarea id="messagesInput" rows="2" class="w-full bg-gray-900 border border-cyan-500 rounded-xl px-4 py-3 text-white" placeholder="Pesan1, Pesan2"></textarea>
            <button id="defaultMsgBtn" class="text-xs text-cyan-400 mt-1">📋 Pakai default</button>
        </div>

        <!-- Settings -->
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div><label class="text-cyan-400 text-xs">THREAD</label><input type="number" id="threads" value="20" class="w-full bg-gray-900 border border-cyan-500 rounded-lg p-2 text-white"></div>
            <div><label class="text-cyan-400 text-xs">DELAY (MS)</label><input type="number" id="delay" value="150" class="w-full bg-gray-900 border border-cyan-500 rounded-lg p-2 text-white"></div>
            <div><label class="text-cyan-400 text-xs">PROXY MODE</label><select id="proxyMode" class="w-full bg-gray-900 border border-cyan-500 rounded-lg p-2 text-white"><option value="1">FREE PROXY</option><option value="2">NO PROXY</option></select></div>
        </div>

        <!-- Buttons -->
        <div class="flex gap-3 mb-6">
            <button id="startBtn" class="bg-red-600 hover:bg-red-500 text-white font-bold py-3 px-6 rounded-xl flex-1 shadow-lg">🔥 START SPAM 🔥</button>
            <button id="stopBtn" class="bg-gray-800 hover:bg-gray-700 text-white py-3 px-6 rounded-xl flex-1">⏹️ STOP</button>
            <button id="clearBtn" class="bg-gray-800 hover:bg-gray-700 text-white py-3 px-4 rounded-xl">🗑️ CLEAR</button>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-4 gap-3 mb-5">
            <div class="bg-gray-900 p-3 rounded-xl text-center"><div class="text-cyan-400 text-xs">SENT</div><div class="text-2xl font-bold text-white" id="totalSent">0</div></div>
            <div class="bg-gray-900 p-3 rounded-xl text-center"><div class="text-green-400 text-xs">SUCCESS</div><div class="text-2xl font-bold text-white" id="successCount">0</div></div>
            <div class="bg-gray-900 p-3 rounded-xl text-center"><div class="text-red-400 text-xs">FAILED</div><div class="text-2xl font-bold text-white" id="failedCount">0</div></div>
            <div class="bg-gray-900 p-3 rounded-xl text-center"><div class="text-yellow-400 text-xs">RATE/S</div><div class="text-2xl font-bold text-white" id="rate">0</div></div>
        </div>

        <!-- Log -->
        <div>
            <div class="flex justify-between mb-2"><span class="text-cyan-400 text-sm">📜 LIVE LOG</span><span id="statusBadge" class="text-xs bg-red-800 px-2 py-1 rounded-full">STOPPED</span></div>
            <div id="logConsole" class="bg-black/80 rounded-xl p-3 h-64 overflow-y-auto font-mono text-xs border border-gray-700"></div>
        </div>
    </div>
    <div class="text-center text-gray-600 text-xs mt-4">DIZX FIXED MODE | BYPASS ALL ERRORS | REAL WORK</div>
</div>

<script>
// =============== FIXED VERSION - PAKE CORS PROXY + ROTATE HEADERS ===============
let isSpamming = false;
let activeThreads = [];
let totalSent = 0, success = 0, failed = 0;
let lastTime = Date.now();
let sentLastSec = 0;

// Free CORS proxies (biar ga kena blokir)
const CORS_PROXIES = [
    "https://api.allorigins.win/raw?url=",
    "https://cors-anywhere.herokuapp.com/",
    "https://proxy.cors.sh/",
    "https://cors-proxy.htmldriven.com/?url="
];

const DEFAULT_MSGS = ["SPAM DIZX 😈", "KENZIE KENA SPAM", "GAS TERUS 🔥", "BOT ACTIVE", "NO MERCY 💀", "DIZX RULES"];

function addLog(msg, type = "info") {
    const logDiv = document.getElementById("logConsole");
    const colors = { success: "text-green-400", error: "text-red-400", info: "text-cyan-400", warn: "text-yellow-400" };
    const time = new Date().toLocaleTimeString();
    logDiv.innerHTML += `<div class="${colors[type]}">[${time}] ${msg}</div>`;
    logDiv.scrollTop = logDiv.scrollHeight;
    if (logDiv.children.length > 150) while(logDiv.children.length > 120) logDiv.removeChild(logDiv.firstChild);
}

function updateUI() {
    document.getElementById("totalSent").innerText = totalSent;
    document.getElementById("successCount").innerText = success;
    document.getElementById("failedCount").innerText = failed;
    const now = Date.now();
    const elapsed = (now - lastTime)/1000;
    if(elapsed >= 1) {
        document.getElementById("rate").innerText = Math.round(sentLastSec/elapsed);
        sentLastSec = 0;
        lastTime = now;
    }
}

// Fungsi kirim pake proxy biar tembus CORS & blokir
async function sendSpamViaProxy(targetCode, message, threadId) {
    const directUrl = "https://ngl.link/api/submit";
    const proxyIndex = Math.floor(Math.random() * CORS_PROXIES.length);
    const proxyUrl = CORS_PROXIES[proxyIndex] + encodeURIComponent(directUrl);
    
    const deviceId = `web_${Date.now()}_${Math.random()*1000000}_${threadId}`;
    const randomIP = `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
    
    const payload = {
        question: message + ` [T${threadId}]`,
        deviceId: deviceId,
        gameSlug: "",
        referrer: targetCode
    };
    
    try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 8000);
        
        const response = await fetch(proxyUrl, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Origin": "https://ngl.link",
                "Referer": "https://ngl.link/",
                "User-Agent": `Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/${Math.floor(Math.random()*50)+100}`,
                "X-Forwarded-For": randomIP
            },
            body: JSON.stringify(payload),
            signal: controller.signal
        });
        
        clearTimeout(timeout);
        totalSent++;
        sentLastSec++;
        
        if (response.ok || response.status === 200) {
            success++;
            addLog(`✅ T${threadId} SUCCESS: ${message.substring(0,30)}`, "success");
            updateUI();
            return true;
        } else {
            failed++;
            addLog(`❌ T${threadId} FAIL (${response.status})`, "error");
            updateUI();
            return false;
        }
    } catch(e) {
        failed++;
        addLog(`💀 T${threadId} ERROR: ${e.message.substring(0,40)}`, "error");
        updateUI();
        return false;
    }
}

// Fallback: kirim langsung ke API NGL (tanpa proxy)
async function sendSpamDirect(targetCode, message, threadId) {
    const deviceId = `android_${Date.now()}_${Math.random()*999999}`;
    const payload = {
        question: message + ` [T${threadId}]`,
        deviceId: deviceId,
        gameSlug: "",
        referrer: targetCode
    };
    
    try {
        const response = await fetch("https://ngl.link/api/submit", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });
        totalSent++;
        sentLastSec++;
        if(response.ok) { success++; addLog(`✅ DIRECT: ${message}`, "success"); }
        else { failed++; addLog(`❌ DIRECT FAIL ${response.status}`, "error"); }
        updateUI();
        return response.ok;
    } catch(e) { failed++; addLog(`💀 DIRECT ERR: ${e.message}`, "error"); updateUI(); return false; }
}

async function spamLoop(targetCode, messages, delayMs, threadId, useProxy) {
    while(isSpamming) {
        const msg = messages[Math.floor(Math.random() * messages.length)];
        if(useProxy) await sendSpamViaProxy(targetCode, msg, threadId);
        else await sendSpamDirect(targetCode, msg, threadId);
        await new Promise(r => setTimeout(r, delayMs));
    }
}

function startSpam() {
    if(isSpamming) { addLog("⚠️ Spam already running!", "warn"); return; }
    
    const target = document.getElementById("targetCode").value.trim();
    if(!target) { addLog("❌ Masukkan target code!", "error"); Swal.fire("Error", "Target kosong!", "error"); return; }
    
    let msgs = document.getElementById("messagesInput").value.trim();
    let msgArray = msgs ? msgs.split(/[,\n]/).map(m=>m.trim()).filter(m=>m) : [...DEFAULT_MSGS];
    if(msgArray.length === 0) msgArray = [...DEFAULT_MSGS];
    
    const threads = Math.min(parseInt(document.getElementById("threads").value) || 20, 100);
    const delay = Math.max(parseInt(document.getElementById("delay").value) || 150, 50);
    const useProxy = document.getElementById("proxyMode").value === "1";
    
    isSpamming = true;
    totalSent = success = failed = 0;
    sentLastSec = 0;
    lastTime = Date.now();
    updateUI();
    document.getElementById("statusBadge").innerHTML = "🔥 SPAMMING 🔥";
    document.getElementById("statusBadge").classList = "text-xs bg-green-800 px-2 py-1 rounded-full";
    addLog(`🔥 START SPAM KE @${target} | THREAD:${threads} | DELAY:${delay}ms | PROXY:${useProxy ? "ON" : "OFF"}`, "warn");
    
    for(let i=1; i<=threads; i++) {
        activeThreads.push(spamLoop(target, msgArray, delay, i, useProxy));
    }
}

function stopSpam() {
    if(!isSpamming) { addLog("⚠️ No active spam", "warn"); return; }
    isSpamming = false;
    activeThreads = [];
    document.getElementById("statusBadge").innerHTML = "⛔ STOPPED";
    document.getElementById("statusBadge").classList = "text-xs bg-red-800 px-2 py-1 rounded-full";
    addLog("🛑 SPAM STOPPED", "warn");
    Swal.fire("Stopped!", "Spam bot dihentikan.", "info");
}

function clearLog() { document.getElementById("logConsole").innerHTML = '<div class="text-gray-500">[!] Log cleared.</div>'; }
function loadDefaultMsg() { document.getElementById("messagesInput").value = DEFAULT_MSGS.join(", "); addLog("Default messages loaded", "info"); }

document.getElementById("startBtn").onclick = startSpam;
document.getElementById("stopBtn").onclick = stopSpam;
document.getElementById("clearBtn").onclick = clearLog;
document.getElementById("defaultMsgBtn").onclick = loadDefaultMsg;

addLog("✅ DIZX FIXED VERSION READY | CORS PROXY + ROTATE HEADERS ACTIVE", "success");
addLog("💀 PASTIKAN TARGET CODE BENAR! Gunakan PROXY MODE = ON untuk terbaik", "warn");
</script>
</body>
</html>
